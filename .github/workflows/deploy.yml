name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual triggers from the Actions tab

# Grant the GITHUB_TOKEN the permissions needed by deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; cancel in-flight runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── 1. Build the static SPA ─────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        env:
          NUXT_PUBLIC_API_URL: ${{ secrets.NUXT_PUBLIC_API_URL }}
          NUXT_PUBLIC_WS_URL:  ${{ secrets.NUXT_PUBLIC_WS_URL }}
          NUXT_APP_BASE_URL:   ${{ vars.NUXT_APP_BASE_URL || '/dmMe/' }}
        run: npm run generate

      - name: Copy 404.html for SPA routing
        run: cp .output/public/index.html .output/public/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/.output/public

  # ── 2. Deploy to GitHub Pages ────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
