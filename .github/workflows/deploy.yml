name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Debug — node & npm versions
        run: node --version && npm --version

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Generate static site
        working-directory: frontend
        env:
          NUXT_PUBLIC_API_URL: ${{ secrets.NUXT_PUBLIC_API_URL }}
          NUXT_PUBLIC_WS_URL: ${{ secrets.NUXT_PUBLIC_WS_URL }}
          NUXT_APP_BASE_URL: '/dmMe/'
          NUXT_TELEMETRY_DISABLED: '1'
        run: npm run generate

      - name: Debug — list build output
        working-directory: frontend
        run: ls -la .output/public/ || echo "GENERATE FAILED — .output/public not found"

      - name: Copy 404.html for SPA routing
        working-directory: frontend
        run: cp .output/public/index.html .output/public/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
